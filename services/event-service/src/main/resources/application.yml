server:
  port: 8082

spring:
  application:
    name: event-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

api:
  ticketmaster:
    key: ${TICKETMASTER_API_KEY:fWFOy7WdKtGZXcwr5GoRmR6h4dSCXexc}

mock:
  events:
    enabled: false  # Mettre true pour utiliser les mocks

resilience4j:
  circuitbreaker:
    instances:
      ticketmasterApi:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      ticketmasterApi:
        maxAttempts: 3
        waitDuration: 1000

logging:
  level:
    com.event: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
