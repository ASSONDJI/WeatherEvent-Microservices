server:
  port: 8083

spring:
  application:
    name: recommendation-service
  profiles:
    active: local

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.recommendation: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
