server:
  port: 8081

spring:
  application:
    name: weather-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

api:
  openweather:
    key: ${OPENWEATHER_API_KEY:}

mock:
  weather:
    enabled: false

weather:
  cache:
    ttl: 600

resilience4j:
  circuitbreaker:
    instances:
      openweatherApi:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
  retry:
    instances:
      openweatherApi:
        maxAttempts: 3
        waitDuration: 1s
  timelimiter:
    instances:
      openweatherApi:
        timeoutDuration: 5s

logging:
  level:
    com.weather: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
