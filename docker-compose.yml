version: '3.8'

services:
  eureka-server:
    build: ./services/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - weather-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  weather-service:
    build: ./services/weather-service
    container_name: weather-service
    ports:
      - "8081:8081"
    networks:
      - weather-network
    depends_on:
      - eureka-server
      - redis
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=docker
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - REDIS_HOST=redis
      - KEYCLOAK_JWK_URI=http://keycloak:8080/realms/weather-event/protocol/openid-connect/certs

  event-service:
    build: ./services/event-service
    container_name: event-service
    ports:
      - "8082:8082"
    networks:
      - weather-network
    depends_on:
      - eureka-server
      - redis
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=docker
      - TICKETMASTER_API_KEY=${TICKETMASTER_API_KEY}
      - REDIS_HOST=redis

  recommendation-service:
    build: ./services/recommendation-service
    container_name: recommendation-service
    ports:
      - "8083:8083"
    networks:
      - weather-network
    depends_on:
      - eureka-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=docker

  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    networks:
      - weather-network
    depends_on:
      - eureka-server
      - weather-service
      - event-service
      - recommendation-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_PROFILES_ACTIVE=docker

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - weather-network
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: keycloak
    ports:
      - "8084:8080"
    networks:
      - weather-network
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=dev-file
      - KC_HOSTNAME=keycloak
      - KC_HOSTNAME_STRICT=false
    command: start-dev

  agenda-service:
    build:
      context: ./services/agenda-service
    container_name: agenda-service
    ports:
      - "8086:8086"
    networks:
      - weather-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - REDIS_HOST=redis
      - WEATHER_SERVICE_URL=http://weather-service:8081
      - EVENT_SERVICE_URL=http://event-service:8082
      - RECOMMENDATION_SERVICE_URL=http://recommendation-service:8083
    depends_on:
      - eureka-server
      - redis
      - weather-service
      - event-service
      - recommendation-service

  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    ports:
      - "5432:5432"
    networks:
      - weather-network
    environment:
      - POSTGRES_DB=reservationdb
      - POSTGRES_USER=reservation_user
      - POSTGRES_PASSWORD=reservation_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservation_user -d reservationdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  reservation-service:
    build:
      context: ./services/reservation-service
    container_name: reservation-service
    ports:
      - "8085:8085"
    networks:
      - weather-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_HOST=postgres
      - DB_NAME=reservationdb
      - DB_USER=reservation_user
      - DB_PASSWORD=reservation_pass
    depends_on:
      - eureka-server
      - postgres

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks:
      - weather-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    networks:
      - weather-network
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks:
      - weather-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    networks:
      - weather-network
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper

  notification-service:
    build:
      context: ./services/notification-service
    container_name: notification-service
    ports:
      - "8087:8087"
    networks:
      - weather-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DB_HOST=postgres
      - DB_NOTIFICATION_NAME=notificationdb
      - DB_USER=notification_user
      - DB_PASSWORD=notification_pass
    depends_on:
      - eureka-server
      - kafka
      - postgres

networks:
  weather-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
    driver: local